# Supabase local development config.
# Docs: https://supabase.com/docs/guides/local-development/cli/config

project_id = "uvxkipafnzclvxtlhfqi"

[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322

[studio]
enabled = true
port = 54323

# Per-function gateway overrides. Default is `verify_jwt = true` (gateway
# rejects requests without `Authorization: Bearer <jwt>` before the function
# runs). Modern Supabase API keys (`sb_publishable_*` / `sb_secret_*`) are
# NOT JWTs and don't satisfy the gateway, so the bot can't auth that way.
#
# These two functions are called by the Telegram bot service with
# `X-Spoon-Bot-Secret`. Their function code self-authenticates; the gateway
# is redundant (and blocks the call). Disabling verify_jwt routes the
# request straight to the function, which then enforces the bot secret.

[functions.telegram-auth]
verify_jwt = false

[functions.extract-recipe]
verify_jwt = false

# JSON-import is JWT-only (no bot path), but the gateway only accepts the
# legacy `eyJ...` JWT format and our project uses the new `sb_publishable_*`
# format which doesn't satisfy it. Disabling here so the function's own
# `requireUser` (which DOES accept the modern format) gets to run.
[functions.import-recipes-json]
verify_jwt = false

# moderate-image is dual-mode (bot via X-Spoon-Bot-Secret OR app via JWT).
# Same gateway-bypass reason as extract-recipe.
[functions.moderate-image]
verify_jwt = false

# delete-account is JWT-only but same gateway-format issue as the rest.
[functions.delete-account]
verify_jwt = false
