# Supabase local development config.
# Docs: https://supabase.com/docs/guides/local-development/cli/config

# Replace with your actual project ref (from the Supabase dashboard URL)
# before running `supabase link` or `supabase functions deploy`.
project_id = "spoonsketch"

[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322

[studio]
enabled = true
port = 54323

[functions]
# Verify the caller's JWT by default. Local testing can override with
# `supabase functions serve <name> --no-verify-jwt`.
verify_jwt = true
