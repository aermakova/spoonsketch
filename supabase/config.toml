[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322

[studio]
enabled = true
port = 54323

# Newer CLI expects per-function settings (map keyed by function name) — a
# top-level `[functions] verify_jwt = bool` block fails to parse. The default
# for deployed functions is `verify_jwt = true`, so we don't need to set it
# unless we want to override per function. Local-only override pattern:
#
#   [functions.<name>]
#   verify_jwt = false   # for testing without a JWT during `supabase functions serve <name>`
